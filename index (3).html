<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Растения против ошибок</title>
<style>
:root{--cw:112px;--ch:78px;--panel:rgba(17,24,39,.9)}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Inter,Arial,sans-serif;background:transparent;color:white}button{font:inherit}
#game{width:100vw;height:100vh;position:relative;overflow:hidden;background:transparent}
.hud{position:absolute;left:14px;right:14px;top:12px;display:flex;justify-content:space-between;gap:10px;z-index:30}
.title{background:var(--panel);border-radius:16px;padding:10px 13px;max-width:58%}
.title h1{margin:0;font-size:clamp(18px,3vw,29px)} .title p{margin:2px 0 0;font-size:12px;opacity:.82}
.stats{display:flex;gap:8px}.pill{background:var(--panel);border-radius:15px;padding:9px 11px;font-weight:900;min-width:74px;text-align:center}
.field{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);width:calc(var(--cw)*7);height:calc(var(--ch)*5);border-radius:22px;border:2px solid rgba(255,255,255,.26);overflow:hidden;background:rgba(255,255,255,.04)}
.lane{position:absolute;left:0;right:0;height:var(--ch);background:rgba(255,255,255,.12);border-top:1px solid rgba(255,255,255,.12);border-bottom:1px solid rgba(255,255,255,.12)}
.grid{position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.18) 1px,transparent 1px),linear-gradient(rgba(255,255,255,.18) 1px,transparent 1px);background-size:var(--cw) var(--ch);pointer-events:none}
.cell{position:absolute;width:var(--cw);height:var(--ch);border:0;background:transparent;cursor:pointer;z-index:4}.cell:hover{background:rgba(255,255,255,.16)}
.base{position:absolute;left:calc(50% - var(--cw)*3.5 - 54px);top:55%;transform:translateY(-50%);font-size:50px;z-index:20;filter:drop-shadow(0 8px 6px rgba(0,0,0,.3))}
.shop{position:absolute;left:14px;bottom:14px;display:flex;gap:10px;align-items:center;background:var(--panel);border-radius:18px;padding:10px;z-index:30}
.shop button{border:0;border-radius:15px;background:white;color:#182132;font-weight:900;padding:11px 13px;cursor:pointer}
.shop #qbtn{background:#ffd54f;color:#3a2a00;font-size:16px}
.shop button:disabled{opacity:.45}
.shop img{width:42px;height:42px;object-fit:contain;vertical-align:middle;margin-right:6px}
.hint{position:absolute;left:50%;bottom:82px;transform:translateX(-50%);padding:8px 12px;border-radius:999px;background:rgba(17,24,39,.78);font-size:14px;font-weight:800;z-index:30}
.entity{position:absolute;width:78px;height:78px;z-index:10;filter:drop-shadow(0 8px 7px rgba(0,0,0,.3))}.entity img{width:100%;height:100%;object-fit:contain}
.hp{position:absolute;left:8px;right:8px;bottom:-3px;height:8px;background:rgba(0,0,0,.35);border-radius:99px;overflow:hidden}.hp span{display:block;height:100%;background:#80f095;width:100%}.enemy .hp span{background:#ff8b8b}
.shot{position:absolute;width:36px;height:36px;z-index:12;filter:drop-shadow(0 0 8px rgba(255,255,255,.7))}.shot img{width:100%;height:100%;object-fit:contain}
.overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(5px);z-index:100;padding:16px}.overlay.show{display:flex}
.modal{width:min(630px,94vw);background:rgba(19,27,43,.97);border-radius:22px;padding:22px;border:2px solid rgba(255,255,255,.18)}
.modal h2{margin:0 0 8px;font-size:28px}
.question{margin:15px 0;padding:16px;background:rgba(255,255,255,.08);border-radius:15px;font-weight:900;font-size:23px}
.answers{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.ans,.primary{border:0;border-radius:15px;padding:14px 16px;font-weight:900;cursor:pointer}
.ans{background:white;color:#111827}.primary{background:#ffd54f;color:#3a2a00}
.feedback{min-height:28px;margin-top:12px;font-weight:900}
@media(max-width:850px){:root{--cw:82px;--ch:62px}.pill{min-width:58px;padding:7px}.title p{display:none}.entity{width:60px;height:60px}.answers{grid-template-columns:1fr}.hint{font-size:12px}.shop{transform:scale(.9);transform-origin:left bottom}}
</style></head>
<body><div id="game">
<div class="hud"><div class="title"><h1 id="t"></h1><p id="s"></p></div><div class="stats"><div class="pill">⚡ <span id="e"></span></div><div class="pill">❤️ <span id="l"></span></div><div class="pill">⭐ <span id="sc"></span></div><div class="pill">❓ <span id="qnum">1</span>/10</div></div></div>
<div id="field" class="field">
  <div class="lane" style="top:0"></div><div class="lane" style="top:var(--ch)"></div><div class="lane" style="top:calc(var(--ch) * 2)"></div><div class="lane" style="top:calc(var(--ch) * 3)"></div><div class="lane" style="top:calc(var(--ch) * 4)"></div>
  <div class="grid"></div>
</div>
<div class="shop"><button id="qbtn">Ответить</button><button id="dbtn"><img id="dicon">Защитник 50</button></div>
<div class="hint">Сначала «Ответить», потом клик по дорожке</div>
<div id="qo" class="overlay"><div class="modal"><h2>Задание</h2><div id="qt" class="question"></div><div id="ans" class="answers"></div><div id="fb" class="feedback"></div><button id="cont" class="primary" style="display:none;margin-top:8px">Продолжить</button></div></div>
<div id="end" class="overlay"><div class="modal"><h2 id="et"></h2><p id="ep"></p><button class="primary" onclick="location.reload()">Играть снова</button></div></div>
</div>

function tick(now){if(!over){let dt=Math.min((now-last)/1000,.05); last=now; if(now-lastEnemy>Math.max(1900,4700-wave*320)){lastEnemy=now; spawnEnemy()} defs.forEach(d=>shoot(d,now));
for(let i=shots.length-1;i>=0;i--){let sh=shots[i]; sh.x+=sh.speed*dt; sh.el.style.left=sh.x+'px'; let hit=ens.find(o=>o.r===sh.r&&Math.abs((o.x+35)-sh.x)<32); if(hit){hit.hp-=sh.damage; bar(hit); sh.el.remove(); shots.splice(i,1); if(hit.hp<=0) remEnemy(hit,true); continue} if(sh.x>COLS*cw()){sh.el.remove(); shots.splice(i,1)}}
for(let i=ens.length-1;i>=0;i--){let en=ens[i]; let blocker=defs.find(d=>d.r===en.r&&Math.abs(d.x-en.x)<54); if(blocker){en.x+=24*dt; blocker.hp-=18*dt; bar(blocker); if(blocker.hp<=0) remDef(blocker)} else en.x-=en.speed*dt; en.el.style.left=en.x+'px'; if(en.x<18){lives--; hud(); remEnemy(en,false); if(lives<=0){finish(false); break}}}}
requestAnimationFrame(tick)}
function openQ(){if(over) return; if(qIndex>=CFG.tasks.length){finish(true);return} current=CFG.tasks[qIndex]; qt.textContent=current.q; ans.innerHTML=''; fb.textContent=''; cont.style.display='none'; current.answers.forEach((a,i)=>{let b=document.createElement('button'); b.className='ans'; b.textContent=a; b.onclick=()=>answer(i); ans.appendChild(b)}); qo.classList.add('show')}
function answer(i){Array.from(ans.children).forEach(b=>b.disabled=true); if(i===current.correct){energy+=50; score+=5; fb.textContent='Верно! +50 энергии'; fb.style.color='#86efac'} else {lives--; fb.textContent='Неверно. Правильный ответ: '+current.answers[current.correct]; fb.style.color='#fca5a5'} qIndex++; hud(); if(lives<=0){setTimeout(()=>finish(false),500); return} cont.style.display='inline-block'}
function finish(win){over=true; et.textContent=win?'Победа!':'Игра окончена'; ep.textContent=win?CFG.winText:CFG.loseText; qo.classList.remove('show'); end.classList.add('show')}
qbtn.onclick=openQ; cont.onclick=()=>{if(qIndex>=CFG.tasks.length) finish(true); else qo.classList.remove('show')}; buildCells(); hud(); requestAnimationFrame(tick);
</script></body></html>
